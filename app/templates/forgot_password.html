<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Metfraa KPI Tracker</title>
  <link rel="icon" href="/static/img/favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'metfraa-blue': '#1E3A8A',
            'metfraa-blue-dark': '#152A66',
            'metfraa-ink': '#111827',
            'metfraa-gray-50': '#F9FAFB',
            'metfraa-gray-100': '#F3F4F6',
            'metfraa-gray-200': '#E5E7EB',
            'metfraa-gray-300': '#D1D5DB',
            'metfraa-gray-400': '#9CA3AF',
            'metfraa-gray-500': '#6B7280',
          },
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-metfraa-gray-50 to-metfraa-gray-100 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <img src="/static/img/metfraa_logo.png" alt="Metfraa" class="h-14 mx-auto mb-3" onerror="this.style.display='none'">
      <h1 class="text-2xl font-bold text-metfraa-ink">Forgot password?</h1>
      <p class="text-sm text-metfraa-gray-500 mt-1">Request a password reset from HR</p>
    </div>

    <div class="bg-white rounded-xl shadow-lg border border-metfraa-gray-200 p-6">

      {% if ok %}
      <div class="mb-4 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm rounded-lg p-3 flex items-start gap-2">
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span>{{ ok }}</span>
      </div>
      {% endif %}

      {% if err %}
      <div class="mb-4 bg-red-50 border border-red-200 text-red-800 text-sm rounded-lg p-3">
        {{ err }}
      </div>
      {% endif %}

      <form method="POST" action="/auth/forgot-password" class="space-y-4">
        <div>
          <label class="text-xs font-semibold uppercase tracking-wider text-metfraa-gray-500 block mb-1.5">
            Employee code
          </label>
          <input type="text" name="employee_code"
                 required autofocus
                 placeholder="e.g. MET66"
                 class="w-full text-sm font-mono uppercase rounded-lg border-metfraa-gray-300 focus:border-metfraa-blue focus:ring-metfraa-blue px-3 py-2.5" />
        </div>

        <div>
          <label class="text-xs font-semibold uppercase tracking-wider text-metfraa-gray-500 block mb-1.5">
            Reason
          </label>
          <textarea name="reason" rows="3" maxlength="1000"
                    placeholder="Why do you need to reset your password?"
                    class="w-full text-sm rounded-lg border-metfraa-gray-300 focus:border-metfraa-blue focus:ring-metfraa-blue px-3 py-2.5"></textarea>
        </div>

        <button type="submit"
                class="w-full bg-metfraa-blue hover:bg-metfraa-blue-dark text-white font-semibold py-2.5 rounded-lg shadow-md hover:shadow-lg transition">
          Send request to HR
        </button>
      </form>

      <div class="mt-4 text-center">
        <a href="/auth/login" class="text-xs text-metfraa-gray-500 hover:text-metfraa-ink">
          Back to sign in
        </a>
      </div>

      <div class="mt-4 text-[11px] text-metfraa-gray-500 bg-metfraa-gray-50 rounded p-2 border border-metfraa-gray-200">
        HR will review your request. Once approved, your password will be reset to the default and you'll be notified.
      </div>
    </div>
  </div>

</body>
</html>
